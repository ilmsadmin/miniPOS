<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Mini POS — Hoàn tất đơn hàng</title>
  <link rel="stylesheet" href="shared.css">
  <style>
    .phone { justify-content:center; align-items:center; overflow:hidden; }
    .phone::before { display:none; }

    .success-content {
      display:flex; flex-direction:column; align-items:center;
      padding:0 var(--sp-32); text-align:center;
      position:relative; z-index:1;
      width:100%;
    }

    /* ─── Check circle ─── */
    .check-wrap {
      width:120px; height:120px; position:relative; margin-bottom:28px;
    }
    .check-ring {
      position:absolute; inset:0; border-radius:50%;
      border:3px solid var(--success);
      opacity:0; animation:ringIn 0.6s var(--ease-spring) 0.2s forwards;
    }
    .check-ring:nth-child(2) {
      inset:-14px;
      border:2px solid rgba(0,230,118,0.2);
      animation-delay:0.5s;
    }
    @keyframes ringIn { 0%{opacity:0;transform:scale(0.5)} 100%{opacity:1;transform:scale(1)} }

    .check-circle {
      width:120px; height:120px; border-radius:50%;
      background:linear-gradient(135deg, var(--success) 0%, #69F0AE 100%);
      display:flex; align-items:center; justify-content:center;
      position:relative; z-index:2;
      box-shadow:0 12px 40px rgba(0,230,118,0.3);
      opacity:0; animation:checkIn 0.5s var(--ease-spring) 0.1s forwards;
    }
    .check-circle .material-symbols-rounded {
      font-size:56px; color:#fff;
      opacity:0; animation:iconPop 0.4s var(--ease-spring) 0.5s forwards;
    }
    @keyframes checkIn { 0%{opacity:0;transform:scale(0.3)} 100%{opacity:1;transform:scale(1)} }
    @keyframes iconPop { 0%{opacity:0;transform:scale(0) rotate(-30deg)} 100%{opacity:1;transform:scale(1) rotate(0)} }

    /* ─── Text ─── */
    .success-title {
      font-size:24px; font-weight:900; margin-bottom:6px;
      opacity:0; animation:fadeUp 0.5s ease 0.6s forwards;
    }
    .order-id {
      font-size:14px; font-weight:600; color:var(--text-3);
      margin-bottom:6px;
      opacity:0; animation:fadeUp 0.5s ease 0.7s forwards;
    }
    .order-amount {
      font-size:32px; font-weight:900; letter-spacing:-0.5px;
      background:var(--grad-price);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
      margin-bottom:6px;
      opacity:0; animation:fadeUp 0.5s ease 0.8s forwards;
    }
    .order-date {
      font-size:12px; color:var(--text-3); font-weight:500;
      opacity:0; animation:fadeUp 0.5s ease 0.9s forwards;
    }
    @keyframes fadeUp { 0%{opacity:0;transform:translateY(12px)} 100%{opacity:1;transform:translateY(0)} }

    /* ─── Actions ─── */
    .actions {
      width:100%; margin-top:32px;
      display:flex; flex-direction:column; gap:var(--sp-8);
      opacity:0; animation:fadeUp 0.5s ease 1s forwards;
    }
    .act-btn {
      width:100%; height:50px; border-radius:var(--r-lg);
      border:1px solid var(--border-l); background:var(--bg-card);
      color:var(--text-1); font-size:14px; font-weight:700;
      font-family:inherit; cursor:pointer;
      display:flex; align-items:center; justify-content:center; gap:var(--sp-8);
      transition:all 0.2s;
    }
    .act-btn:hover { background:var(--bg-card-hover); border-color:var(--primary); }
    .act-btn:active { transform:scale(0.97); }
    .act-btn .material-symbols-rounded { font-size:20px; color:var(--text-2); }

    .act-primary {
      background:var(--grad-fab); background-size:200% 200%;
      animation:fabG 4s ease infinite;
      border:none; color:#fff;
      height:56px; font-size:16px; font-weight:800;
      box-shadow:var(--shadow-fab);
      border-radius:var(--r-2xl); margin-top:var(--sp-8);
    }
    @keyframes fabG { 0%,100%{background-position:0% 50%} 50%{background-position:100% 50%} }
    .act-primary:hover { filter:brightness(1.08); box-shadow:var(--shadow-fab), 0 0 32px var(--primary-glow); }
    .act-primary .material-symbols-rounded { color:#fff; }

    /* ─── Auto redirect ─── */
    .auto-text {
      margin-top:20px; font-size:12px; color:var(--text-3); font-weight:500;
      opacity:0; animation:fadeUp 0.5s ease 1.2s forwards;
    }
    .auto-text span { color:var(--primary-light); font-weight:700; }

    /* ─── Confetti particles ─── */
    .confetti { position:absolute; inset:0; pointer-events:none; overflow:hidden; z-index:0; }
    .cf {
      position:absolute; width:8px; height:8px;
      border-radius:2px; opacity:0;
      animation:confettiFall 2.5s ease forwards;
    }
    .cf:nth-child(1) { background:var(--primary); left:10%; animation-delay:0.2s; }
    .cf:nth-child(2) { background:var(--accent); left:25%; animation-delay:0.4s; width:6px; height:10px; }
    .cf:nth-child(3) { background:var(--success); left:40%; animation-delay:0.1s; }
    .cf:nth-child(4) { background:var(--warning); left:55%; animation-delay:0.5s; width:10px; height:6px; }
    .cf:nth-child(5) { background:var(--primary-light); left:70%; animation-delay:0.3s; }
    .cf:nth-child(6) { background:var(--accent); left:85%; animation-delay:0.6s; width:6px; height:6px; }
    .cf:nth-child(7) { background:var(--error); left:15%; animation-delay:0.7s; }
    .cf:nth-child(8) { background:var(--success); left:60%; animation-delay:0.15s; width:7px; height:9px; }
    .cf:nth-child(9) { background:var(--primary); left:80%; animation-delay:0.45s; }
    .cf:nth-child(10) { background:var(--warning); left:35%; animation-delay:0.55s; }
    @keyframes confettiFall {
      0% { top:-10%; opacity:1; transform:rotate(0deg) scale(1); }
      50% { opacity:1; }
      100% { top:110%; opacity:0; transform:rotate(720deg) scale(0.3); }
    }

    /* ─── Light ─── */
    [data-theme="light"] .check-circle { box-shadow:0 12px 40px rgba(0,184,98,0.2); }
    [data-theme="light"] .act-btn { box-shadow:var(--shadow-sm); }
  </style>
</head>
<body>
  <div class="phone">
    <div class="status-bar" style="position:absolute;top:0;left:0;right:0;">
      <span>9:41</span>
      <div class="si">
        <span class="material-symbols-rounded">signal_cellular_alt</span>
        <span class="material-symbols-rounded">wifi</span>
        <span class="material-symbols-rounded">battery_full</span>
      </div>
    </div>

    <!-- Confetti -->
    <div class="confetti">
      <div class="cf"></div><div class="cf"></div><div class="cf"></div>
      <div class="cf"></div><div class="cf"></div><div class="cf"></div>
      <div class="cf"></div><div class="cf"></div><div class="cf"></div>
      <div class="cf"></div>
    </div>

    <div class="success-content">
      <div class="check-wrap">
        <div class="check-ring"></div>
        <div class="check-ring"></div>
        <div class="check-circle">
          <span class="material-symbols-rounded">check</span>
        </div>
      </div>

      <h1 class="success-title">Thanh toán thành công!</h1>
      <div class="order-id">Đơn hàng #DH-00142</div>
      <div class="order-amount">28,225đ</div>
      <div class="order-date">04/04/2026 — 14:32</div>

      <div class="actions">
        <button class="act-btn" onclick="toast('Đang in hóa đơn...')">
          <span class="material-symbols-rounded">print</span>
          In hóa đơn
        </button>
        <button class="act-btn" onclick="toast('Gửi qua Zalo/SMS...')">
          <span class="material-symbols-rounded">share</span>
          Gửi qua Zalo / SMS
        </button>
        <button class="act-btn" onclick="toast('Xem chi tiết đơn')">
          <span class="material-symbols-rounded">receipt_long</span>
          Xem chi tiết đơn
        </button>
        <button class="act-btn act-primary" onclick="location.href='pos-home.html'">
          <span class="material-symbols-rounded">add_circle</span>
          Tạo đơn hàng mới
        </button>
      </div>

      <div class="auto-text">Tự động về POS sau <span id="countdown">5</span> giây...</div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast">
    <div class="ti"><span class="material-symbols-rounded">check</span></div>
    <span id="tmsg"></span>
  </div>

  <script>
    (function(){const t=localStorage.getItem('pos-theme')||'dark';document.documentElement.setAttribute('data-theme',t)})();

    let tt;
    function toast(m){
      const el=document.getElementById('toast');
      document.getElementById('tmsg').textContent=m;
      el.classList.add('show'); clearTimeout(tt);
      tt=setTimeout(()=>el.classList.remove('show'),1400);
    }

    // Countdown
    let sec = 5;
    const cd = setInterval(() => {
      sec--;
      document.getElementById('countdown').textContent = sec;
      if (sec <= 0) { clearInterval(cd); location.href = 'pos-home.html'; }
    }, 1000);
  </script>
</body>
</html>
