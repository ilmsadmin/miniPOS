<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Mini POS — Thanh toán</title>
  <link rel="stylesheet" href="shared.css">
  <style>
    .phone { overflow:hidden; }

    /* ─── Top bar ─── */
    .topbar {
      height:56px; display:flex; align-items:center; gap:var(--sp-12);
      padding:0 var(--sp-8) 0 var(--sp-4); flex-shrink:0;
      position:relative; z-index:1;
    }
    .back-btn {
      width:44px; height:44px; border-radius:var(--r-full);
      border:none; background:transparent; color:var(--text-2);
      cursor:pointer; display:flex; align-items:center; justify-content:center;
      transition:all 0.2s; font-size:0;
    }
    .back-btn:hover { background:var(--bg-input); color:var(--text-1); }
    .back-btn:active { transform:scale(0.9); }
    .back-btn .material-symbols-rounded { font-size:24px; }
    .topbar-title { font-size:18px; font-weight:800; flex:1; }

    /* ─── Amount display ─── */
    .amount-display {
      text-align:center; padding:var(--sp-16) var(--sp-24) var(--sp-24);
      flex-shrink:0; position:relative; z-index:1;
    }
    .amount-label { font-size:13px; color:var(--text-3); font-weight:600; margin-bottom:var(--sp-8); }
    .amount-value {
      font-size:36px; font-weight:900; letter-spacing:-1px;
      background:var(--grad-price);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    }

    /* ─── Payment methods ─── */
    .methods-section {
      padding:0 var(--sp-24); flex-shrink:0; position:relative; z-index:1;
    }
    .section-label {
      font-size:12px; font-weight:700; color:var(--text-3);
      text-transform:uppercase; letter-spacing:0.8px;
      margin-bottom:var(--sp-12);
    }
    .methods {
      display:flex; gap:var(--sp-8);
    }
    .method-card {
      flex:1; padding:var(--sp-16) var(--sp-8);
      border-radius:var(--r-lg); border:2px solid var(--border);
      background:var(--bg-card); cursor:pointer;
      display:flex; flex-direction:column; align-items:center; gap:var(--sp-8);
      transition:all 0.2s; font-family:inherit;
      color:var(--text-2);
    }
    .method-card:hover { border-color:var(--border-l); background:var(--bg-card-hover); }
    .method-card.on {
      border-color:var(--primary); background:rgba(108,92,231,0.08);
      color:var(--text-1);
    }
    .method-card.on .mi { background:var(--grad-primary); color:#fff; box-shadow:var(--shadow-primary); }
    .mi {
      width:44px; height:44px; border-radius:var(--r-md);
      background:var(--bg-elevated); color:var(--text-3);
      display:flex; align-items:center; justify-content:center;
      transition:all 0.2s;
    }
    .mi .material-symbols-rounded { font-size:24px; }
    .method-card .ml { font-size:12px; font-weight:700; }

    /* ─── Customer pay input ─── */
    .pay-input-section {
      padding:var(--sp-24) var(--sp-24) var(--sp-12);
      flex-shrink:0; position:relative; z-index:1;
    }
    .pay-input-row {
      display:flex; align-items:center; gap:var(--sp-12);
    }
    .pay-input-label { font-size:13px; font-weight:700; color:var(--text-2); white-space:nowrap; }
    .pay-input {
      flex:1; height:52px; border-radius:var(--r-lg);
      border:2px solid var(--border-l); background:var(--bg-input);
      font-size:22px; font-weight:800; color:var(--text-1);
      text-align:right; padding:0 var(--sp-16);
      font-family:'Inter', sans-serif; outline:none;
      transition:all 0.2s;
    }
    .pay-input:focus {
      border-color:var(--primary); background:var(--bg-input-hover);
      box-shadow:0 0 0 3px var(--primary-glow);
    }

    /* ─── Quick amounts ─── */
    .quick-amounts {
      display:flex; flex-wrap:wrap; gap:var(--sp-8);
      padding:var(--sp-8) var(--sp-24) var(--sp-16);
      flex-shrink:0; position:relative; z-index:1;
    }
    .qa-btn {
      flex:1; min-width:calc(33.33% - 6px);
      height:38px; border-radius:var(--r-md);
      border:1px solid var(--border-l); background:var(--bg-card);
      color:var(--text-2); font-size:13px; font-weight:700;
      font-family:inherit; cursor:pointer; transition:all 0.15s;
    }
    .qa-btn:hover { background:var(--bg-card-hover); color:var(--text-1); border-color:var(--primary); }
    .qa-btn:active { transform:scale(0.95); }
    .qa-btn.exact { border-color:var(--primary); color:var(--primary-light); background:rgba(108,92,231,0.06); }

    /* ─── Change display ─── */
    .change-display {
      text-align:center; padding:var(--sp-8) var(--sp-24);
      flex-shrink:0; position:relative; z-index:1;
    }
    .change-row {
      display:inline-flex; align-items:center; gap:var(--sp-8);
      padding:var(--sp-8) var(--sp-20);
      border-radius:var(--r-full);
      background:var(--success-soft);
    }
    .change-row .material-symbols-rounded { font-size:18px; color:var(--success); }
    .change-label { font-size:13px; font-weight:600; color:var(--text-2); }
    .change-value { font-size:16px; font-weight:900; color:var(--success); }
    .change-row.negative { background:var(--error-soft); }
    .change-row.negative .material-symbols-rounded { color:var(--error); }
    .change-row.negative .change-value { color:var(--error); }

    /* ─── Numpad ─── */
    .numpad-wrap {
      flex:1; display:flex; flex-direction:column;
      padding:var(--sp-8) var(--sp-24);
      position:relative; z-index:1;
      min-height:0;
    }
    .numpad {
      display:grid; grid-template-columns:repeat(3, 1fr);
      gap:var(--sp-8); flex:1;
    }
    .nk {
      border-radius:var(--r-lg); border:none;
      background:var(--bg-card); color:var(--text-1);
      font-size:22px; font-weight:700; font-family:'Inter', sans-serif;
      cursor:pointer; transition:all 0.12s;
      display:flex; align-items:center; justify-content:center;
      min-height:48px;
    }
    .nk:hover { background:var(--bg-card-hover); }
    .nk:active { transform:scale(0.93); background:var(--bg-elevated); }
    .nk.del { color:var(--error); }
    .nk.del .material-symbols-rounded { font-size:24px; }

    /* ─── Bottom action ─── */
    .pay-action {
      flex-shrink:0; padding:var(--sp-12) var(--sp-24) var(--sp-24);
      position:relative; z-index:1;
    }
    .note-row {
      display:flex; align-items:center; gap:var(--sp-8);
      margin-bottom:var(--sp-12);
    }
    .note-input {
      flex:1; height:40px; border-radius:var(--r-lg);
      border:1px solid var(--border); background:var(--bg-input);
      font-size:13px; color:var(--text-1); padding:0 var(--sp-12);
      font-family:inherit; outline:none; transition:all 0.2s;
    }
    .note-input::placeholder { color:var(--text-3); }
    .note-input:focus { border-color:var(--primary); }
    .note-icon { color:var(--text-3); flex-shrink:0; }
    .note-icon .material-symbols-rounded { font-size:20px; }

    .confirm-btn {
      width:100%; height:56px; border:none; border-radius:var(--r-2xl);
      background:var(--grad-primary); color:#fff;
      font-size:16px; font-weight:800; font-family:inherit;
      cursor:pointer; display:flex; align-items:center; justify-content:center; gap:var(--sp-8);
      box-shadow:var(--shadow-primary); transition:all 0.25s;
    }
    .confirm-btn:hover { filter:brightness(1.08); box-shadow:var(--shadow-fab); }
    .confirm-btn:active { transform:scale(0.97); }
    .confirm-btn:disabled {
      opacity:0.4; cursor:not-allowed; filter:none;
      box-shadow:none;
    }
    .confirm-btn .material-symbols-rounded { font-size:22px; }

    /* ─── Light ─── */
    [data-theme="light"] .method-card { box-shadow:var(--shadow-sm); }
    [data-theme="light"] .method-card.on { box-shadow:0 2px 12px var(--primary-glow); }
    [data-theme="light"] .nk { box-shadow:var(--shadow-sm); }
  </style>
</head>
<body>
  <div class="phone">
    <div class="status-bar">
      <span>9:41</span>
      <div class="si">
        <span class="material-symbols-rounded">signal_cellular_alt</span>
        <span class="material-symbols-rounded">wifi</span>
        <span class="material-symbols-rounded">battery_full</span>
      </div>
    </div>

    <div class="topbar">
      <button class="back-btn" onclick="history.back()"><span class="material-symbols-rounded">arrow_back</span></button>
      <span class="topbar-title">Thanh toán</span>
    </div>

    <div class="amount-display">
      <div class="amount-label">Tổng cần thanh toán</div>
      <div class="amount-value" id="totalAmt">28,225đ</div>
    </div>

    <div class="methods-section">
      <div class="section-label">Phương thức thanh toán</div>
      <div class="methods" id="methods">
        <button class="method-card on" data-m="cash" onclick="pickMethod(this)">
          <div class="mi"><span class="material-symbols-rounded">payments</span></div>
          <span class="ml">Tiền mặt</span>
        </button>
        <button class="method-card" data-m="transfer" onclick="pickMethod(this)">
          <div class="mi"><span class="material-symbols-rounded">account_balance</span></div>
          <span class="ml">Chuyển khoản</span>
        </button>
        <button class="method-card" data-m="ewallet" onclick="pickMethod(this)">
          <div class="mi"><span class="material-symbols-rounded">smartphone</span></div>
          <span class="ml">Ví điện tử</span>
        </button>
      </div>
    </div>

    <div class="pay-input-section">
      <div class="pay-input-row">
        <span class="pay-input-label">Khách đưa</span>
        <input class="pay-input" id="payInput" value="30,000" inputmode="none" readonly>
      </div>
    </div>

    <div class="quick-amounts" id="quickAmts">
      <button class="qa-btn exact" onclick="setAmt(28225)">28,225đ</button>
      <button class="qa-btn" onclick="setAmt(30000)">30,000đ</button>
      <button class="qa-btn" onclick="setAmt(50000)">50,000đ</button>
      <button class="qa-btn" onclick="setAmt(100000)">100,000đ</button>
      <button class="qa-btn" onclick="setAmt(200000)">200,000đ</button>
      <button class="qa-btn" onclick="setAmt(500000)">500,000đ</button>
    </div>

    <div class="change-display" id="changeDisplay">
      <div class="change-row" id="changeRow">
        <span class="material-symbols-rounded">check_circle</span>
        <span class="change-label">Tiền thừa</span>
        <span class="change-value" id="changeVal">1,775đ</span>
      </div>
    </div>

    <div class="numpad-wrap">
      <div class="numpad">
        <button class="nk" onclick="nk('1')">1</button>
        <button class="nk" onclick="nk('2')">2</button>
        <button class="nk" onclick="nk('3')">3</button>
        <button class="nk" onclick="nk('4')">4</button>
        <button class="nk" onclick="nk('5')">5</button>
        <button class="nk" onclick="nk('6')">6</button>
        <button class="nk" onclick="nk('7')">7</button>
        <button class="nk" onclick="nk('8')">8</button>
        <button class="nk" onclick="nk('9')">9</button>
        <button class="nk" onclick="nk('000')">000</button>
        <button class="nk" onclick="nk('0')">0</button>
        <button class="nk del" onclick="nk('del')"><span class="material-symbols-rounded">backspace</span></button>
      </div>
    </div>

    <div class="pay-action">
      <div class="note-row">
        <div class="note-icon"><span class="material-symbols-rounded">edit_note</span></div>
        <input class="note-input" placeholder="Ghi chú đơn hàng (tuỳ chọn)">
      </div>
      <button class="confirm-btn" id="confirmBtn" onclick="confirmPay()">
        <span class="material-symbols-rounded">verified</span>
        Xác nhận thanh toán
      </button>
    </div>
  </div>

  <script>
    (function(){const t=localStorage.getItem('pos-theme')||'dark';document.documentElement.setAttribute('data-theme',t)})();

    const TOTAL = 28225;
    let raw = '30000';
    const fmt = n => n.toLocaleString('vi-VN') + 'đ';

    function pickMethod(el) {
      document.querySelectorAll('.method-card').forEach(c => c.classList.remove('on'));
      el.classList.add('on');
    }

    function setAmt(n) {
      raw = String(n);
      updateDisplay();
    }

    function nk(k) {
      if (k === 'del') { raw = raw.slice(0, -1); }
      else { if (raw.length >= 10) return; raw += k; }
      updateDisplay();
    }

    function updateDisplay() {
      const n = parseInt(raw) || 0;
      document.getElementById('payInput').value = n > 0 ? n.toLocaleString('vi-VN') : '';
      const change = n - TOTAL;
      const row = document.getElementById('changeRow');
      const val = document.getElementById('changeVal');
      const btn = document.getElementById('confirmBtn');

      if (n === 0) {
        row.className = 'change-row'; row.style.opacity = '0.3';
        val.textContent = '0đ';
        btn.disabled = true;
      } else if (change >= 0) {
        row.className = 'change-row'; row.style.opacity = '1';
        row.querySelector('.material-symbols-rounded').textContent = 'check_circle';
        document.querySelector('.change-label').textContent = 'Tiền thừa';
        val.textContent = fmt(change);
        btn.disabled = false;
      } else {
        row.className = 'change-row negative'; row.style.opacity = '1';
        row.querySelector('.material-symbols-rounded').textContent = 'warning';
        document.querySelector('.change-label').textContent = 'Còn thiếu';
        val.textContent = fmt(Math.abs(change));
        btn.disabled = true;
      }
    }

    function confirmPay() {
      window.location.href = 'order-complete.html';
    }

    updateDisplay();
  </script>
</body>
</html>
