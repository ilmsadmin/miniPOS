<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Mini POS — Splash</title>
  <link rel="stylesheet" href="shared.css">
  <style>
    /* ═══════════════════════════════════════
       SPLASH SCREEN — Page-specific styles
       ═══════════════════════════════════════ */

    .phone { justify-content:center; align-items:center; }
    .phone::before { display:none; }

    /* ─── Ambient background orbs ─── */
    .splash-bg {
      position:absolute; inset:0; overflow:hidden; z-index:0;
    }
    .orb {
      position:absolute; border-radius:50%; filter:blur(80px);
      opacity:0; animation:orbIn 2s ease forwards;
    }
    .orb-1 {
      width:300px; height:300px;
      background:radial-gradient(circle, rgba(108,92,231,0.35) 0%, transparent 70%);
      top:-60px; left:-80px;
      animation-delay:0.2s;
    }
    .orb-2 {
      width:250px; height:250px;
      background:radial-gradient(circle, rgba(0,210,255,0.2) 0%, transparent 70%);
      bottom:-40px; right:-60px;
      animation-delay:0.5s;
    }
    .orb-3 {
      width:180px; height:180px;
      background:radial-gradient(circle, rgba(162,155,254,0.15) 0%, transparent 70%);
      top:40%; left:60%;
      animation-delay:0.8s;
    }
    @keyframes orbIn {
      0% { opacity:0; transform:scale(0.6); }
      100% { opacity:1; transform:scale(1); }
    }

    /* ─── Center content ─── */
    .splash-content {
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      position:relative; z-index:1;
      gap:24px;
    }

    /* ─── Logo container ─── */
    .logo-wrap {
      position:relative;
      width:120px; height:120px;
    }

    /* Ring pulse behind logo */
    .logo-ring {
      position:absolute; inset:-16px;
      border-radius:50%;
      border:2px solid rgba(108,92,231,0.3);
      opacity:0;
      animation:ringPulse 2.5s ease-out 1s infinite;
    }
    .logo-ring:nth-child(2) {
      animation-delay:1.6s;
      border-color:rgba(0,210,255,0.2);
    }
    @keyframes ringPulse {
      0% { transform:scale(0.8); opacity:0.8; }
      100% { transform:scale(1.6); opacity:0; }
    }

    /* Logo circle */
    .logo {
      width:120px; height:120px;
      border-radius:50%;
      background:var(--brand-gradient);
      display:flex; align-items:center; justify-content:center;
      position:relative; z-index:2;
      box-shadow:
        0 12px 48px rgba(13,33,55,0.5),
        0 0 0 1px rgba(75,184,240,0.15),
        inset 0 1px 0 rgba(255,255,255,0.1);
      opacity:0;
      animation:logoIn 0.8s var(--ease-spring) 0.3s forwards;
    }
    .logo svg {
      width:56px; height:56px;
      opacity:0;
      animation:iconIn 0.6s var(--ease-spring) 0.7s forwards;
    }
    @keyframes logoIn {
      0% { opacity:0; transform:scale(0.4) rotate(-20deg); }
      100% { opacity:1; transform:scale(1) rotate(0deg); }
    }
    @keyframes iconIn {
      0% { opacity:0; transform:translateY(8px) scale(0.6); }
      100% { opacity:1; transform:translateY(0) scale(1); }
    }

    /* Shimmer sweep on logo */
    .logo::after {
      content:''; position:absolute; inset:0; border-radius:50%;
      background:linear-gradient(
        105deg,
        transparent 40%,
        rgba(255,255,255,0.15) 45%,
        rgba(255,255,255,0.25) 50%,
        rgba(255,255,255,0.15) 55%,
        transparent 60%
      );
      background-size:200% 100%;
      opacity:0;
      animation:shimmer 1.8s ease 1.2s forwards;
    }
    @keyframes shimmer {
      0% { opacity:1; background-position:200% 0; }
      100% { opacity:0; background-position:-200% 0; }
    }

    /* ─── Brand text ─── */
    .splash-brand {
      text-align:center;
      opacity:0;
      animation:brandIn 0.7s ease 0.9s forwards;
    }
    .splash-brand h1 {
      font-size:32px; font-weight:900;
      background:linear-gradient(135deg, var(--text-1) 0%, var(--brand-blue-light) 100%);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
      letter-spacing:-0.5px;
    }
    .splash-brand p {
      font-size:14px; font-weight:500;
      color:var(--text-3);
      margin-top:6px;
      letter-spacing:0.3px;
    }
    @keyframes brandIn {
      0% { opacity:0; transform:translateY(16px); }
      100% { opacity:1; transform:translateY(0); }
    }

    /* ─── Loading indicator ─── */
    .loader-wrap {
      display:flex; flex-direction:column;
      align-items:center; gap:16px;
      margin-top:24px;
      opacity:0;
      animation:loaderIn 0.5s ease 1.4s forwards;
    }
    @keyframes loaderIn {
      0% { opacity:0; }
      100% { opacity:1; }
    }

    .loader-bar {
      width:160px; height:3px;
      background:var(--bg-input);
      border-radius:var(--r-full);
      overflow:hidden;
      position:relative;
    }
    .loader-bar::after {
      content:''; position:absolute;
      top:0; left:-40%; width:40%; height:100%;
      border-radius:var(--r-full);
      background:var(--grad-fab); background-size:200% 100%;
      animation:load 1.6s ease-in-out infinite;
    }
    @keyframes load {
      0% { left:-40%; }
      50% { left:100%; }
      100% { left:100%; }
    }

    .loader-text {
      font-size:12px; font-weight:600;
      color:var(--text-3);
      letter-spacing:0.5px;
    }

    /* ─── Version tag ─── */
    .version {
      position:absolute; bottom:32px; left:50%;
      transform:translateX(-50%);
      font-size:11px; font-weight:600;
      color:var(--text-3);
      opacity:0;
      animation:fadeIn 0.6s ease 0.2s forwards;
      z-index:1;
    }
    .version span {
      color:var(--primary-light); font-weight:700;
    }
    @keyframes fadeIn {
      0% { opacity:0; }
      100% { opacity:0.6; }
    }

    /* ─── Zenix Labs brand ─── */
    .zenix-brand {
      position:absolute; bottom:48px; left:50%;
      transform:translateX(-50%);
      opacity:0;
      animation:zenixIn 0.8s ease 0.1s forwards;
      z-index:1;
      display:flex; flex-direction:column; align-items:center; gap:4px;
      white-space:nowrap;
    }
    .zenix-label {
      font-size:10px; font-weight:500;
      color:var(--text-3);
      letter-spacing:0.5px;
    }
    .zenix-name {
      font-size:18px; font-weight:900;
      letter-spacing:1px;
      background:linear-gradient(135deg, #3B9FDB 0%, #4BB8F0 40%, #00D2FF 100%);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    }
    @keyframes zenixIn {
      0% { opacity:0; transform:translateX(-50%) translateY(10px); }
      100% { opacity:1; transform:translateX(-50%) translateY(0); }
    }
    [data-theme="light"] .zenix-name {
      background:linear-gradient(135deg, #0D2137 0%, #1A7FC4 40%, #0099CC 100%);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    }

    /* ─── Particle dots ─── */
    .particles {
      position:absolute; inset:0; z-index:0; overflow:hidden;
      pointer-events:none;
    }
    .dot {
      position:absolute;
      width:4px; height:4px;
      border-radius:50%;
      background:var(--primary-light);
      opacity:0;
      animation:drift 6s ease-in-out infinite;
    }
    .dot:nth-child(1) { top:15%; left:20%; animation-delay:0s; background:var(--primary); }
    .dot:nth-child(2) { top:25%; right:15%; animation-delay:1s; width:3px; height:3px; background:var(--accent); }
    .dot:nth-child(3) { bottom:30%; left:12%; animation-delay:2s; width:5px; height:5px; }
    .dot:nth-child(4) { bottom:20%; right:25%; animation-delay:0.5s; width:3px; height:3px; background:var(--accent); }
    .dot:nth-child(5) { top:50%; left:80%; animation-delay:1.5s; background:var(--primary); }
    .dot:nth-child(6) { top:70%; left:30%; animation-delay:3s; width:3px; height:3px; }
    @keyframes drift {
      0%, 100% { opacity:0; transform:translateY(0) scale(0.5); }
      20% { opacity:0.5; }
      50% { opacity:0.3; transform:translateY(-30px) scale(1); }
      80% { opacity:0.5; }
    }

    /* ─── Full-screen fade out ─── */
    .splash-exit {
      animation:exitOut 0.6s ease 3.8s forwards;
    }
    .splash-exit .splash-content,
    .splash-exit .zenix-brand,
    .splash-exit .version {
      animation:contentExit 0.5s ease 3.6s forwards;
    }
    @keyframes contentExit {
      0% { opacity:1; transform:translateY(0) scale(1); }
      100% { opacity:0; transform:translateY(-20px) scale(0.96); }
    }
    @keyframes exitOut {
      0% { opacity:1; }
      100% { opacity:0; }
    }

    /* ─── Light mode tweaks ─── */
    [data-theme="light"] .orb-1 { background:radial-gradient(circle, rgba(91,76,219,0.12) 0%, transparent 70%); }
    [data-theme="light"] .orb-2 { background:radial-gradient(circle, rgba(0,153,204,0.08) 0%, transparent 70%); }
    [data-theme="light"] .orb-3 { background:radial-gradient(circle, rgba(124,111,240,0.06) 0%, transparent 70%); }
    [data-theme="light"] .logo { box-shadow:0 12px 48px rgba(13,33,55,0.15), 0 0 0 1px rgba(75,184,240,0.1); }
    [data-theme="light"] .splash-brand h1 {
      background:linear-gradient(135deg, var(--text-1) 0%, #1A6FAE 100%);
      -webkit-background-clip:text; background-clip:text;
    }
    [data-theme="light"] .dot { opacity:0.15; }
  </style>
</head>
<body>
  <div class="phone splash-exit">
    <!-- Ambient orbs -->
    <div class="splash-bg">
      <div class="orb orb-1"></div>
      <div class="orb orb-2"></div>
      <div class="orb orb-3"></div>
    </div>

    <!-- Floating particles -->
    <div class="particles">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>

    <!-- Status bar -->
    <div class="status-bar" style="position:absolute;top:0;left:0;right:0;">
      <span>9:41</span>
      <div class="si">
        <span class="material-symbols-rounded">signal_cellular_alt</span>
        <span class="material-symbols-rounded">wifi</span>
        <span class="material-symbols-rounded">battery_full</span>
      </div>
    </div>

    <!-- Center content -->
    <div class="splash-content">
      <div class="logo-wrap">
        <div class="logo-ring"></div>
        <div class="logo-ring"></div>
        <div class="logo">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M7 18c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm10 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zM7.16 14.26l.04-.12L8.1 12h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49A1 1 0 0 0 20 3H5.21l-.94-2H1v2h2l3.6 7.59-1.35 2.44C4.52 14.37 5.48 16 7 16h12v-2H7.42c-.14 0-.25-.11-.25-.25z" fill="white"/>
          </svg>
        </div>
      </div>

      <div class="splash-brand">
        <h1>Mini POS</h1>
        <p>Quản lý bán hàng thông minh</p>
      </div>

      <div class="loader-wrap">
        <div class="loader-bar"></div>
        <span class="loader-text">Đang khởi tạo...</span>
      </div>
    </div>

    <!-- Bottom info -->
    <div class="zenix-brand">
      <span class="zenix-label">Designed by</span>
      <span class="zenix-name">Zenix Labs</span>
    </div>
    <div class="version">v<span>1.0.0</span></div>
  </div>

  <script>
    /* Theme */
    (function(){
      const t = localStorage.getItem('pos-theme') || 'dark';
      document.documentElement.setAttribute('data-theme', t);
    })();

    /* Auto-navigate to onboarding after splash completes */
    setTimeout(() => {
      window.location.href = 'onboarding.html';
    }, 4200);
  </script>
</body>
</html>
