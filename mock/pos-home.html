<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Mini POS — Home Screen</title>
  <link rel="stylesheet" href="shared.css">
  <style>
    /* ═══════════════════════════════════════
       POS HOME — Page-specific styles
       ═══════════════════════════════════════ */

    /* ═══ SEARCH ═══ */
    .search-wrap { padding:var(--sp-4) var(--sp-16) var(--sp-12); flex-shrink:0; z-index:1; position:relative; }
    .search-bar {
      height:48px; background:var(--bg-input); border:1px solid var(--border);
      border-radius:var(--r-2xl); display:flex; align-items:center;
      padding:0 var(--sp-6) 0 var(--sp-16); gap:var(--sp-12);
      transition:all 0.2s;
    }
    .search-bar:focus-within {
      border-color:var(--primary); background:var(--bg-input-hover);
      box-shadow:0 0 0 3px var(--primary-glow);
    }
    .search-bar .material-symbols-rounded { color:var(--text-3); font-size:22px; flex-shrink:0; }
    .search-bar input {
      flex:1; border:none; background:transparent;
      font-size:15px; font-family:inherit; color:var(--text-1); outline:none;
    }
    .search-bar input::placeholder { color:var(--text-3); }
    .scan-btn {
      width:36px; height:36px; border-radius:var(--r-full);
      border:none; cursor:pointer; background:var(--grad-primary); color:#fff;
      display:flex; align-items:center; justify-content:center;
      box-shadow:var(--shadow-primary); transition:all 0.2s; flex-shrink:0;
    }
    .scan-btn .material-symbols-rounded { font-size:20px; }
    .scan-btn:hover { filter:brightness(1.15); box-shadow:var(--shadow-primary), 0 0 16px var(--primary-glow); }
    .scan-btn:active { transform:scale(0.9); }

    /* ═══ CHIPS ═══ */
    .chips-wrap { padding:0 0 var(--sp-12); flex-shrink:0; position:relative; z-index:1; }
    .chips {
      display:flex; gap:var(--sp-8); padding:0 var(--sp-16);
      overflow-x:auto; scrollbar-width:none; scroll-behavior:smooth;
    }
    .chips::-webkit-scrollbar { display:none; }
    .chip {
      display:inline-flex; align-items:center; gap:var(--sp-6);
      height:34px; padding:0 var(--sp-16);
      border-radius:var(--r-full); border:1px solid var(--border-l);
      background:transparent; color:var(--text-2);
      font-size:13px; font-weight:600; font-family:inherit;
      cursor:pointer; white-space:nowrap; flex-shrink:0; transition:all 0.2s;
    }
    .chip:hover { background:var(--bg-input); color:var(--text-1); }
    .chip.on {
      background:var(--primary); color:#fff;
      border-color:var(--primary); box-shadow:0 2px 12px var(--primary-glow);
    }
    .chip .ck { font-size:16px; display:none; }
    .chip.on .ck { display:inline; }

    /* ═══ GRID ═══ */
    .grid-wrap {
      flex:1; overflow-y:auto; overflow-x:hidden;
      padding:0 var(--sp-12) var(--sp-8); position:relative; z-index:1;
    }
    .grid-wrap::-webkit-scrollbar { width:0; }
    .grid { display:grid; grid-template-columns:repeat(3, 1fr); gap:var(--sp-8); }

    .prod {
      background:var(--bg-card); border-radius:var(--r-lg);
      overflow:hidden; cursor:pointer; border:1px solid var(--border);
      position:relative; transition:all 0.18s;
    }
    .prod::after {
      content:''; position:absolute; inset:0;
      background:linear-gradient(145deg, var(--prod-sheen) 0%, transparent 100%);
      border-radius:var(--r-lg); pointer-events:none;
    }
    .prod:hover {
      border-color:var(--border-l); background:var(--bg-card-hover);
      transform:translateY(-2px); box-shadow:var(--shadow-md);
    }
    .prod:active { transform:scale(0.96); }
    .prod.out { opacity:0.4; pointer-events:none; }
    .prod.out .thumb { filter:grayscale(1) brightness(0.7); }

    .thumb {
      width:100%; aspect-ratio:1;
      background:var(--bg-elevated);
      display:flex; align-items:center; justify-content:center;
      font-size:38px; position:relative; overflow:hidden;
    }
    .thumb::after {
      content:''; position:absolute; bottom:0; left:0; right:0; height:40%;
      background:linear-gradient(transparent, var(--thumb-vignette));
      pointer-events:none;
    }
    .qb {
      position:absolute; top:6px; left:6px;
      min-width:22px; height:22px; border-radius:var(--r-full);
      background:var(--primary); color:#fff;
      font-size:11px; font-weight:800;
      display:flex; align-items:center; justify-content:center;
      padding:0 5px; box-shadow:0 2px 8px var(--primary-glow);
      animation:pop 0.3s var(--ease-spring); z-index:2;
    }
    @keyframes pop { 0%{transform:scale(0)} 100%{transform:scale(1)} }
    .st {
      position:absolute; top:6px; right:6px;
      font-size:9px; font-weight:800;
      padding:2px 6px; border-radius:var(--r-sm);
      text-transform:uppercase; letter-spacing:0.3px; z-index:2;
    }
    .st.low { background:var(--warning-soft); color:var(--warning); }
    .st.out { background:var(--error-soft); color:var(--error); }
    .st.stock { background:rgba(0,0,0,0.55); color:#fff; }

    .pbody { padding:var(--sp-8) var(--sp-8) var(--sp-12); }
    .pname {
      font-size:11.5px; font-weight:600; color:var(--text-1);
      line-height:1.35; display:-webkit-box;
      -webkit-line-clamp:2; -webkit-box-orient:vertical;
      overflow:hidden; min-height:31px;
    }
    .pprice {
      font-size:14px; font-weight:800; margin-top:var(--sp-4);
      background:var(--grad-price);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    }
    .pstock {
      font-size:10px; font-weight:600; color:var(--text-3); margin-top:2px;
    }

    /* ═══ CART BAR ═══ */
    .cart-wrap { padding:var(--sp-8) var(--sp-16); flex-shrink:0; position:relative; z-index:2; }
    .cbar {
      height:54px; border-radius:var(--r-2xl);
      display:flex; align-items:center; justify-content:space-between;
      padding:0 var(--sp-8) 0 var(--sp-20);
      cursor:pointer; transition:all 0.25s;
      animation:cartIn 0.4s var(--ease-spring);
    }
    @keyframes cartIn { 0%{transform:translateY(60px);opacity:0} 100%{transform:translateY(0);opacity:1} }
    .cbar.has {
      background:var(--grad-primary); color:#fff;
      box-shadow:var(--shadow-fab);
    }
    .cbar.has:hover { filter:brightness(1.08); box-shadow:var(--shadow-fab), 0 0 32px var(--primary-glow); }
    .cbar.has:active { transform:scale(0.97); }
    .cbar.nil {
      background:var(--bg-input); color:var(--text-3);
      border:1px solid var(--border); cursor:default; box-shadow:none;
    }
    .cl { display:flex; align-items:center; gap:var(--sp-12); }
    .cl .material-symbols-rounded { font-size:22px; }
    .clbl { font-size:14px; font-weight:600; }
    .cr { display:flex; align-items:center; gap:var(--sp-8); }
    .ctot { font-size:16px; font-weight:900; letter-spacing:-0.3px; }
    .carrow {
      width:38px; height:38px; border-radius:var(--r-full);
      background:var(--carrow-bg);
      display:flex; align-items:center; justify-content:center;
      backdrop-filter:blur(4px);
    }

    /* ═══ BOTTOM NAV — duplicates removed, in shared.css ═══ */

    /* ═══ SHEET CONTENT ═══ */
    .shthead {
      display:flex; align-items:center; justify-content:space-between;
      padding:0 var(--sp-24) var(--sp-16); flex-shrink:0;
    }
    .shthead h2 { font-size:20px; font-weight:800; }
    .clr-btn {
      font-size:13px; font-weight:700; color:var(--error);
      background:var(--error-soft); border:none;
      border-radius:var(--r-full); padding:var(--sp-6) var(--sp-16);
      cursor:pointer; transition:all 0.2s; display:flex; align-items:center; gap:4px;
    }
    .clr-btn:hover { background:rgba(255,82,82,0.2); }
    .shtbody { flex:1; overflow-y:auto; padding:0 var(--sp-24); }

    .ci { display:flex; gap:var(--sp-12); padding:var(--sp-12) 0; border-bottom:1px solid var(--divider); align-items:center; }
    .ci:last-child { border-bottom:none; }
    .ciimg {
      width:48px; height:48px; border-radius:var(--r-md);
      background:var(--bg-elevated);
      display:flex; align-items:center; justify-content:center;
      font-size:26px; flex-shrink:0;
    }
    .ciinfo { flex:1; min-width:0; }
    .ciname { font-size:14px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .cimeta { font-size:12px; color:var(--text-3); margin-top:2px; }
    .ciright { text-align:right; flex-shrink:0; }
    .ciprice {
      font-size:14px; font-weight:800;
      background:var(--grad-price);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    }
    .qctrl { display:flex; align-items:center; gap:var(--sp-6); margin-top:var(--sp-4); }
    .qb2 {
      width:26px; height:26px; border-radius:var(--r-full);
      border:1px solid var(--border-l); background:transparent;
      color:var(--text-1); cursor:pointer;
      display:flex; align-items:center; justify-content:center; transition:all 0.15s;
    }
    .qb2 .material-symbols-rounded { font-size:16px; }
    .qb2:hover { background:var(--bg-input); }
    .qb2:active { transform:scale(0.85); }
    .qv { font-size:13px; font-weight:800; min-width:18px; text-align:center; }

    .custrow {
      display:flex; align-items:center; justify-content:space-between;
      padding:var(--sp-16) var(--sp-24); border-top:1px solid var(--divider);
    }
    .custl { display:flex; align-items:center; gap:var(--sp-12); }
    .custav {
      width:36px; height:36px; border-radius:var(--r-full);
      background:linear-gradient(135deg, #A29BFE, #6C5CE7);
      display:flex; align-items:center; justify-content:center;
    }
    .custav .material-symbols-rounded { font-size:18px; color:#fff; }
    .custn { font-size:14px; font-weight:700; }
    .custlbl { font-size:11px; color:var(--text-3); }
    .custchg {
      font-size:13px; font-weight:700; color:var(--primary-light);
      background:none; border:none; cursor:pointer; padding:var(--sp-8);
    }

    .csummary {
      padding:var(--sp-16) var(--sp-24) var(--sp-24);
      border-top:1px solid var(--divider); flex-shrink:0;
      background:linear-gradient(180deg, transparent 0%, rgba(108,92,231,0.04) 100%);
    }
    .sr { display:flex; justify-content:space-between; font-size:13px; color:var(--text-2); padding:3px 0; }
    .sr.tot {
      font-size:20px; font-weight:900; color:var(--text-1);
      padding-top:var(--sp-12); margin-top:var(--sp-8);
      border-top:2px solid var(--border-l);
    }
    .sr.disc .v { color:var(--success); }

    .pay {
      width:100%; height:54px; border:none;
      border-radius:var(--r-2xl); background:var(--grad-primary);
      color:#fff; font-size:16px; font-weight:800;
      font-family:inherit; cursor:pointer; margin-top:var(--sp-16);
      display:flex; align-items:center; justify-content:center; gap:var(--sp-8);
      box-shadow:var(--shadow-primary); transition:all 0.2s;
    }
    .pay:hover { filter:brightness(1.1); box-shadow:var(--shadow-fab); }
    .pay:active { transform:scale(0.97); }
    .pay .material-symbols-rounded { font-size:22px; }
  </style>
</head>
<body>
  <div class="toast" id="toast">
    <div class="ti"><span class="material-symbols-rounded">check</span></div>
    <span id="tmsg">Đã thêm</span>
  </div>
  <div class="ov" id="ov" onclick="togSht()"></div>

  <div class="phone">
    <div class="status-bar">
      <span>9:41</span>
      <div class="si">
        <span class="material-symbols-rounded">signal_cellular_alt</span>
        <span class="material-symbols-rounded">wifi</span>
        <span class="material-symbols-rounded">battery_full</span>
      </div>
    </div>

    <div class="header">
      <div class="brand">
        <div class="brand-icon">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M7 18c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm10 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zM7.16 14.26l.04-.12L8.1 12h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49A1 1 0 0 0 20 3H5.21l-.94-2H1v2h2l3.6 7.59-1.35 2.44C4.52 14.37 5.48 16 7 16h12v-2H7.42c-.14 0-.25-.11-.25-.25z" fill="white"/>
          </svg>
        </div>
        <span class="brand-text">Mini POS</span>
      </div>
      <div class="hdr-actions">
        <button class="theme-btn" id="themeBtn" onclick="toggleTheme()" title="Chuyển Dark/Light">
          <span class="material-symbols-rounded" id="themeIcon">light_mode</span>
        </button>
        <button class="icon-btn"><span class="material-symbols-rounded">notifications</span><span class="badge">3</span></button>
        <button class="avatar">Z</button>
      </div>
    </div>

    <div class="search-wrap">
      <div class="search-bar">
        <span class="material-symbols-rounded">search</span>
        <input type="text" placeholder="Tìm sản phẩm..." id="sInput">
        <button class="scan-btn"><span class="material-symbols-rounded">qr_code_scanner</span></button>
      </div>
    </div>

    <div class="chips-wrap">
      <div class="chips" id="chips">
        <button class="chip on" data-c="all"><span class="material-symbols-rounded ck" style="font-size:16px">check</span>Tất cả</button>
        <button class="chip" data-c="drinks"><span class="chip-icon ci-drinks"><span class="material-symbols-rounded">local_cafe</span></span>Đồ uống</button>
        <button class="chip" data-c="food"><span class="chip-icon ci-food"><span class="material-symbols-rounded">restaurant</span></span>Thực phẩm</button>
        <button class="chip" data-c="snacks"><span class="chip-icon ci-snacks"><span class="material-symbols-rounded">cookie</span></span>Snack</button>
        <button class="chip" data-c="household"><span class="chip-icon ci-household"><span class="material-symbols-rounded">cleaning_services</span></span>Đồ dùng</button>
        <button class="chip" data-c="dairy"><span class="chip-icon ci-dairy"><span class="material-symbols-rounded">water_drop</span></span>Sữa</button>
      </div>
    </div>

    <div class="grid-wrap">
      <div class="grid" id="grid"></div>
    </div>

    <div class="cart-wrap">
      <div class="cbar nil" id="cbar" onclick="togSht()">
        <div class="cl">
          <span class="material-symbols-rounded">shopping_cart</span>
          <span class="clbl" id="clbl">Giỏ hàng trống</span>
        </div>
        <div class="cr">
          <span class="ctot" id="ctot"></span>
          <div class="carrow"><span class="material-symbols-rounded" style="font-size:20px">keyboard_arrow_up</span></div>
        </div>
      </div>
    </div>

    <nav class="bnav">
      <button class="ni" onclick="toast('Kho hàng')">
        <div class="npill"><span class="material-symbols-rounded">warehouse</span></div>
        <span>Kho hàng</span>
        <span class="nbadge">3</span>
      </button>
      <button class="ni" onclick="toast('Quản lý')">
        <div class="npill"><span class="material-symbols-rounded">list_alt</span></div>
        <span>Quản lý</span>
      </button>
      <div class="nspc"></div>
      <button class="ni" onclick="toast('Báo cáo')">
        <div class="npill"><span class="material-symbols-rounded">bar_chart</span></div>
        <span>Báo cáo</span>
      </button>
      <button class="ni" onclick="toast('Cài đặt')">
        <div class="npill"><span class="material-symbols-rounded">more_horiz</span></div>
        <span>Thêm</span>
      </button>
      <div class="fab-wrap">
        <button class="fab on" id="fab">
          <span class="material-symbols-rounded">point_of_sale</span>
          <span class="fab-lbl">POS</span>
        </button>
      </div>
    </nav>
  </div>

  <!-- Sheet -->
  <div class="sht" id="sht">
    <div class="shthandle"></div>
    <div class="shthead">
      <h2>Giỏ hàng <span style="opacity:0.4;font-weight:400" id="sc">(0)</span></h2>
      <button class="clr-btn" onclick="clr()">
        <span class="material-symbols-rounded" style="font-size:14px">delete</span>Xóa hết
      </button>
    </div>
    <div class="shtbody" id="sitems"></div>
    <div class="custrow">
      <div class="custl">
        <div class="custav"><span class="material-symbols-rounded">person</span></div>
        <div><div class="custn">Khách lẻ</div><div class="custlbl">Khách hàng</div></div>
      </div>
      <button class="custchg">Thay đổi ›</button>
    </div>
    <div class="csummary">
      <div class="sr"><span>Tạm tính</span><span id="xsub">0đ</span></div>
      <div class="sr"><span>Thuế (10%)</span><span id="xtax">0đ</span></div>
      <div class="sr disc"><span>Giảm giá</span><span class="v" id="xdisc">0đ</span></div>
      <div class="sr tot"><span>Tổng cộng</span><span id="xtot">0đ</span></div>
      <button class="pay" onclick="checkout()">
        <span class="material-symbols-rounded">payments</span>
        Thanh toán — <span id="xpay">0đ</span>
      </button>
    </div>
  </div>

  <script>
    /* ═══ THEME SYSTEM ═══ */
    function getTheme() {
      return localStorage.getItem('pos-theme') || 'dark';
    }
    function applyTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      const icon = document.getElementById('themeIcon');
      if (icon) icon.textContent = theme === 'dark' ? 'light_mode' : 'dark_mode';
      localStorage.setItem('pos-theme', theme);
    }
    function toggleTheme() {
      const current = getTheme();
      const next = current === 'dark' ? 'light' : 'dark';
      applyTheme(next);
      toast(next === 'light' ? 'Light Mode' : 'Dark Mode');
    }
    // Apply saved theme on load
    applyTheme(getTheme());

    /* ═══ DATA ═══ */
    const P=[
      {id:1,n:'Coca Cola 330ml',p:12000,i:'local_drink',c:'drinks',s:48},
      {id:2,n:'Pepsi 330ml',p:11000,i:'local_drink',c:'drinks',s:36},
      {id:3,n:'Mì Hảo Hảo',p:3500,i:'ramen_dining',c:'food',s:5},
      {id:4,n:'Sting Dâu 330ml',p:8000,i:'bolt',c:'drinks',s:24},
      {id:5,n:'Snack Oishi',p:5000,i:'cookie',c:'snacks',s:0},
      {id:6,n:'Nước suối Lavie',p:4000,i:'water_drop',c:'drinks',s:60},
      {id:7,n:'Trà xanh 0°',p:10000,i:'emoji_food_beverage',c:'drinks',s:18},
      {id:8,n:'Bánh mì sandwich',p:15000,i:'bakery_dining',c:'food',s:8},
      {id:9,n:'Sữa Vinamilk',p:7000,i:'water_drop',c:'dairy',s:30},
      {id:10,n:'Nước rửa tay',p:25000,i:'soap',c:'household',s:12},
      {id:11,n:'Khăn giấy Pulppy',p:18000,i:'dry_cleaning',c:'household',s:3},
      {id:12,n:'Bột giặt OMO 800g',p:35000,i:'local_laundry_service',c:'household',s:15},
      {id:13,n:'Xúc xích Vissan',p:6000,i:'lunch_dining',c:'food',s:20},
      {id:14,n:'Kẹo Alpenliebe',p:2000,i:'candy',c:'snacks',s:50},
      {id:15,n:'Dầu ăn Simply 1L',p:42000,i:'water_drop',c:'food',s:7},
      {id:16,n:'C2 Chanh 455ml',p:7000,i:'local_cafe',c:'drinks',s:22},
      {id:17,n:'Chocopie hộp 6',p:28000,i:'cake',c:'snacks',s:10},
      {id:18,n:'Sữa chua Vinamilk',p:5000,i:'icecream',c:'dairy',s:25},
    ];
    let cart={}, sOpen=false, aCat='all';
    const fmt=n=>n.toLocaleString('vi-VN')+'đ';
    const $=id=>document.getElementById(id);

    function render(){
      const q=$('sInput').value.toLowerCase().trim();
      let items=aCat==='all'?[...P]:P.filter(x=>x.c===aCat);
      if(q) items=items.filter(x=>x.n.toLowerCase().includes(q));
      $('grid').innerHTML=items.map(p=>{
        const qty=cart[p.id]||0, out=p.s===0, low=p.s>0&&p.s<=5;
        return `<div class="prod ${out?'out':''}" onclick="${out?'':`add(${p.id})`}">
          <div class="thumb"><div class="pi pi-${p.c}"><span class="material-symbols-rounded">${p.i}</span></div>
            ${qty?`<div class="qb">${qty}</div>`:''}
            ${out?'<span class="st out">Hết hàng</span>':''}
            ${low?`<span class="st low">Còn ${p.s}</span>`:''}
            ${!out&&!low?`<span class="st stock">Tồn: ${p.s}</span>`:''}
          </div>
          <div class="pbody"><div class="pname">${p.n}</div><div class="pprice">${fmt(p.p)}</div><div class="pstock">${out?'Hết hàng':`Tồn: ${p.s}`}</div></div>
        </div>`;
      }).join('');
    }

    function add(id){
      const p=P.find(x=>x.id===id); if(!p)return;
      const cur=cart[id]||0;
      if(cur>=p.s){toast(`Chỉ còn ${p.s}!`);return;}
      cart[id]=cur+1; sync(); render(); toast(`${p.n}`);
      if(sOpen) rSheet();
    }
    function minus(id){ if(cart[id]>1)cart[id]--;else delete cart[id]; sync(); render(); rSheet(); }
    function plus(id){ add(id); }
    function clr(){ cart={}; sync(); render(); rSheet(); }

    function sync(){
      const bar=$('cbar');
      const tq=Object.values(cart).reduce((a,b)=>a+b,0);
      const tp=Object.entries(cart).reduce((s,[id,q])=>{const p=P.find(x=>x.id===+id);return s+(p?p.p*q:0);},0);
      if(tq===0){ bar.className='cbar nil'; $('clbl').textContent='Giỏ hàng trống'; $('ctot').textContent=''; }
      else{ bar.className='cbar has'; $('clbl').textContent=`${tq} sản phẩm`; $('ctot').textContent=fmt(tp); }
    }

    function togSht(){
      const tq=Object.values(cart).reduce((a,b)=>a+b,0);
      if(!tq&&!sOpen)return;
      sOpen=!sOpen;
      if(sOpen)rSheet();
      $('sht').classList.toggle('open',sOpen);
      $('ov').classList.toggle('vis',sOpen);
    }

    function rSheet(){
      const entries=Object.entries(cart);
      const tq=entries.reduce((s,[,q])=>s+q,0);
      $('sc').textContent=`(${tq})`;
      $('sitems').innerHTML=entries.map(([id,qty])=>{
        const p=P.find(x=>x.id===+id); if(!p)return '';
        return `<div class="ci">
          <div class="ciimg"><span class="material-symbols-rounded" style="color:var(--ic-${p.c})">${p.i}</span></div>
          <div class="ciinfo"><div class="ciname">${p.n}</div><div class="cimeta">${fmt(p.p)} × ${qty}</div></div>
          <div class="ciright">
            <div class="ciprice">${fmt(p.p*qty)}</div>
            <div class="qctrl">
              <button class="qb2" onclick="minus(${p.id})"><span class="material-symbols-rounded">remove</span></button>
              <span class="qv">${qty}</span>
              <button class="qb2" onclick="plus(${p.id})"><span class="material-symbols-rounded">add</span></button>
            </div>
          </div>
        </div>`;
      }).join('');
      const sub=entries.reduce((s,[id,q])=>{const p=P.find(x=>x.id===+id);return s+(p?p.p*q:0);},0);
      const tax=Math.round(sub*0.1), disc=0, tot=sub+tax-disc;
      $('xsub').textContent=fmt(sub);
      $('xtax').textContent=fmt(tax);
      $('xdisc').textContent=disc?`-${fmt(disc)}`:'0đ';
      $('xtot').textContent=fmt(tot);
      $('xpay').textContent=fmt(tot);
    }

    function checkout(){ toast('Chuyển đến thanh toán...'); togSht(); }

    $('chips').addEventListener('click',e=>{
      const c=e.target.closest('.chip'); if(!c)return;
      document.querySelectorAll('.chip').forEach(el=>{el.classList.remove('on');const ck=el.querySelector('.ck');if(ck)ck.style.display='none';});
      c.classList.add('on'); const ck=c.querySelector('.ck'); if(ck)ck.style.display='inline';
      aCat=c.dataset.c; render();
    });
    $('sInput').addEventListener('input',render);

    let tt;
    function toast(m){
      const el=$('toast'); $('tmsg').textContent=m;
      el.classList.add('show'); clearTimeout(tt);
      tt=setTimeout(()=>el.classList.remove('show'),1400);
    }

    render();
  </script>
</body>
</html>
